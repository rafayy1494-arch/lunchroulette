<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LunchRoulette</title>
  <style>
    /* Basic Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    body {
      background: linear-gradient(to bottom, #f9f9f9, #ffe4b5);
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      color: #ff6f61;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 40px;
    }

    button {
      background-color: #ff6f61;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 1.2rem;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background-color: #ff3b2e;
      transform: scale(1.05);
    }

    #result {
      margin-top: 30px;
      font-size: 1.5rem;
      font-weight: bold;
      color: #0077b6;
    }

    footer {
      margin-top: auto;
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>🍴 LunchRoulette 🍴</h1>
  <p>Can't decide what to eat? Let LunchRoulette decide for you!</p>
  
  <button onclick="pickLunch()">Spin the Wheel!</button>
  
  <div id="result"></div>

  <footer>
    Made with ❤️ by Abdul Rafay
  </footer>

  <script>
    const options = [
      "Pizza 🍕",
      "Burger 🍔",
      "Sushi 🍣",
      "Pasta 🍝",
      "Salad 🥗",
      "Tacos 🌮",
      "Biryani 🍛",
      "Ice Cream 🍨"
    ];

    function pickLunch() {
      const randomIndex = Math.floor(Math.random() * options.length);
      const choice = options[randomIndex];
      document.getElementById("result").innerText = "You should eat: " + choice;
    }
  </script>
</body>
</html>
